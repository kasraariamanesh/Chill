name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-validate:
    name: 🧪 Lint, Build, and Sync Simulation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Build Assets and Server
      run: npm run build

    - name: Execute 5-Cycle Real-Time Synchronization Test Suite
      run: npx tsx src/tests/sync-simulation.ts

  build-and-deploy:
    name: 🚀 Production Container Release (Zero Downtime)
    needs: test-and-validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # The steps below can be tailored to target GCR/GAR and Cloud Run / Kubernetes
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: gcr.io
        username: _json_key
        password: ${{ secrets.GCP_SA_KEY }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/watch-party-cinema:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Cloud Run (Rolling Deployment)
      run: |
        gcloud run deploy watch-party-cinema \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/watch-party-cinema:latest \
          --platform managed \
          --region europe-west2 \
          --allow-unauthenticated \
          --port 3000
